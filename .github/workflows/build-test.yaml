name: Build and Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DENO_DIR: ./.cache
  DENO_VER: "1.39.0"

jobs:
  caching:
    name: "Update Caches"
    runs-on: ubuntu-latest
    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
      - name: "Setup cache"
        uses: actions/cache@v3
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ hashFiles('deno.lock' )}}
      - name: "Setup Deno"
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VER }}
      - name: "Update cache"
        run: |
          find src test -type f -print0 | \
            xargs -0 deno cache
  coding-checks:
    name: "Coding Checks"
    runs-on: ubuntu-latest
    needs:
      - caching
    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
      - name: "Setup cache"
        uses: actions/cache@v3
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ hashFiles('deno.lock') }}
      - name: "Setup Deno"
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VER }}
      - name: "Lint check"
        run: deno lint
      - name: "Format check"
        run: deno fmt --check
  unit-test:
    name: "Testing"
    runs-on: ubuntu-latest
    needs:
      - caching
    steps:
      - name: "Check out code"
        uses: actions/checkout@v3
      - name: "Setup cache"
        uses: actions/cache@v3
        with:
          path: ${{ env.DENO_DIR }}
          key: deno-${{ hashFiles('deno.lock') }}
      - name: "Setup Deno"
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VER }}
      - name: "Run unit tests"
        run: deno test -A --coverage
      - name: "Generate coverage reports"
        run: |
          deno coverage \
            --exclude=test \
            --lcov --output=coverage/lcov \
            coverage
      - name: "Report coverage"
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov
      - name: "Report coverage"
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov
